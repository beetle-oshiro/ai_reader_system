<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI解読システム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="form-container">

        <h1>AI解読システム</h1>

        <p class="page-description">
            入力した文章を目的に合わせてわかりやすく整理・解説します。
        </p>

        <form method="POST">

            <div class="input-group">
                <label for="text">解読したい文章</label>
                <textarea id="text" name="text" rows="10" placeholder="ここに文章を入力">{{ text }}</textarea>
            </div>

            <div class="mode-box">
                <p class="mode-title">解読モード</p>

                <label class="radio-item">
                    <input type="radio" name="mode" value="rule" {% if mode == "rule" %}checked{% endif %}>
                    規約・契約の解説
                </label>

                <label class="radio-item">
                    <input type="radio" name="mode" value="error" {% if mode == "error" %}checked{% endif %}>
                    エラーの解説
                </label>

                <label class="radio-item">
                    <input type="radio" name="mode" value="text" {% if mode == "text" %}checked{% endif %}>
                    文章の解読
                </label>

                <label class="radio-item">
                    <input type="radio" name="mode" value="job" {% if mode == "job" %}checked{% endif %}>
                    求人票の読み解き
                </label>
            </div>

            <button type="submit" class="submit-btn">解読する</button>

            {% if result %}
                <div class="result-box">
                    <h2>結果</h2>
                    <div class="result-text">{{ result }}</div>
                </div>

                <button
                    type="submit"
                    name="action"
                    value="easy"
                    class="sub-btn action-btn"
                    {% if not is_valid_mode %}disabled{% endif %}
                >
                    やさしく説明する
                </button>
            {% endif %}

        </form>

    </div>

</body>
</html>
